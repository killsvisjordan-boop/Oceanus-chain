<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCEANUS CHAIN — AI × BLOCKCHAIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cyan: #00ddff;
      --cyan-glow: rgba(0,221,255,0.4);
      --purple: #7b2fff;
      --black: #000408;
      --white: #e8f6ff;
      --muted: #5a8fa8;
      --card-bg: #040f28;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Orbitron', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* scan lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none;
    }

    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* corner brackets */
    .corner { position: fixed; width: 60px; height: 60px; z-index: 3; pointer-events: none; }
    .corner-tl { top:0; left:0; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
    .corner-tr { top:0; right:0; border-top:2px solid var(--cyan); border-right:2px solid var(--cyan); }
    .corner-bl { bottom:0; left:0; border-bottom:2px solid var(--cyan); border-left:2px solid var(--cyan); }
    .corner-br { bottom:0; right:0; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }

    /* ── MAIN ── */
    .site-wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 0;
    }

    /* logo */
    .logo-ring {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 4s ease-in-out infinite;
      margin-bottom: 28px;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(var(--cyan), var(--purple), var(--cyan));
      animation: spin 3s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .logo-inner {
      position: relative;
      z-index: 2;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #0a2a5e, #020818 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px var(--cyan-glow), inset 0 0 30px rgba(0,0,30,0.8);
      overflow: hidden;
    }

    .logo-svg { width: 88px; height: 88px; }

    /* title */
    .main-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(18px, 5vw, 42px);
      letter-spacing: 5px;
      background: linear-gradient(90deg, var(--cyan), #fff, var(--cyan));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 3s linear infinite;
      filter: drop-shadow(0 0 16px var(--cyan));
      text-align: center;
      margin-bottom: 14px;
    }
    @keyframes shine { to{background-position:200% center} }

    .subtitle {
      font-family: 'Orbitron', monospace;
      font-size: clamp(9px, 2vw, 13px);
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--purple);
      text-shadow: 0 0 12px var(--purple);
      text-align: center;
      margin-bottom: 36px;
    }

    /* soon badge */
    .soon-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 26px;
      border: 1px solid rgba(0,221,255,0.2);
      background: rgba(0,221,255,0.04);
      margin-bottom: 44px;
    }
    .soon-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--cyan);
      letter-spacing: 4px;
    }
    .dots { display:flex; gap:6px; }
    .dots span {
      width:6px; height:6px; border-radius:50%;
      background: var(--cyan);
      animation: blink 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    @keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.7)} 40%{opacity:1;transform:scale(1);box-shadow:0 0 8px var(--cyan)} }

    /* APPLY BUTTON */
    .apply-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 2.5vw, 15px);
      letter-spacing: 4px;
      color: #000;
      background: linear-gradient(135deg, var(--cyan), #0099bb);
      border: none;
      padding: 20px 56px;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
      position: relative;
      transition: all .2s;
      box-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(0,221,255,.15);
    }
    .apply-btn::before {
      content:'';
      position:absolute;
      inset:-2px;
      background:linear-gradient(135deg,var(--cyan),var(--purple),var(--cyan));
      clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
      z-index:-1;
      animation: border-pulse 2s ease-in-out infinite;
    }
    @keyframes border-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .apply-btn:hover {
      background: linear-gradient(135deg,#00ffff,var(--cyan));
      transform: scale(1.05);
      box-shadow: 0 0 50px var(--cyan-glow), 0 0 100px rgba(0,221,255,.25);
      letter-spacing: 6px;
    }
    .apply-btn:active { transform: scale(.97); }

    /* ══════════════ MODAL ══════════════ */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,2,12,.92);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .overlay.open { opacity:1; pointer-events:all; }

    .modal {
      background: linear-gradient(160deg, #060f28, #020816);
      border: 1px solid var(--cyan);
      width: 100%;
      max-width: 460px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
      box-shadow: 0 0 60px rgba(0,221,255,.2), 0 0 120px rgba(123,47,255,.1), inset 0 0 30px rgba(0,221,255,.03);
      transform: scale(.92) translateY(16px);
      transition: transform .3s;
    }
    .overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--cyan), var(--purple), var(--cyan));
      background-size: 200% auto;
      animation: shine 2s linear infinite;
    }

    .modal-inner { padding: 32px 36px 36px; }

    .modal-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 30px; height: 30px;
      background: transparent;
      border: 1px solid rgba(0,221,255,.3);
      color: var(--cyan);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .modal-close:hover { background: rgba(0,221,255,.1); border-color: var(--cyan); }

    .modal-heading {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 2.5vw, 14px);
      color: var(--cyan);
      letter-spacing: 2px;
      margin-bottom: 28px;
      text-shadow: 0 0 12px var(--cyan);
      line-height: 1.6;
    }

    /* task rows */
    .task-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(0,221,255,.1);
      border-radius: 0;
      padding: 16px 18px;
      margin-bottom: 12px;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
      transition: border-color .2s;
    }
    .task-row.done { border-color: rgba(0,221,255,.4); }

    .task-label {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 1px;
      flex: 1;
    }

    .task-btn {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 18px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 7px;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
    }
    .task-btn.x-btn {
      background: #fff;
      color: #000;
    }
    .task-btn.x-btn:hover { background: var(--cyan); }
    .task-btn.x-btn.checked {
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      clip-path: none;
      pointer-events: none;
    }
    .task-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* username row */
    .username-row {
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(0,221,255,.1);
      padding: 16px 18px;
      margin-bottom: 20px;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
      transition: border-color .2s;
    }
    .username-row-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--cyan);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .username-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(0,221,255,.3);
      color: var(--white);
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      padding: 8px 4px;
      outline: none;
      transition: border-color .2s;
    }
    .username-input::placeholder { color: rgba(90,143,168,.45); }
    .username-input:focus { border-bottom-color: var(--cyan); }

    /* submit */
    .submit-btn {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, var(--cyan), #007a99);
      border: none;
      color: #000;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      transition: all .2s;
    }
    .submit-btn:hover {
      background: linear-gradient(135deg, #00ffff, var(--cyan));
      box-shadow: 0 0 30px rgba(0,221,255,.4);
      transform: scale(1.01);
    }

    /* success */
    .success { display:none; text-align:center; padding: 10px 0; }
    .success.show { display:block; }
    .success-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 16px;
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
    .success-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: var(--cyan);
      letter-spacing: 2px;
      margin-bottom: 14px;
      text-shadow: 0 0 20px var(--cyan);
      animation: glow-p 2s ease-in-out infinite;
    }
    @keyframes glow-p { 0%,100%{text-shadow:0 0 16px var(--cyan)} 50%{text-shadow:0 0 40px var(--cyan),0 0 60px rgba(0,221,255,.4)} }
    .success-msg {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.9;
      letter-spacing: 1px;
    }
    .success-sparks {
      display:flex; justify-content:center; gap:10px; margin:18px 0;
    }
    .success-sparks span {
      width:8px; height:8px; border-radius:50%;
      animation: spark 1.5s ease-out both;
    }
    .success-sparks span:nth-child(1){background:var(--cyan);animation-delay:.05s}
    .success-sparks span:nth-child(2){background:var(--purple);animation-delay:.15s}
    .success-sparks span:nth-child(3){background:var(--cyan);animation-delay:.25s}
    .success-sparks span:nth-child(4){background:#fff;animation-delay:.1s}
    .success-sparks span:nth-child(5){background:var(--purple);animation-delay:.2s}
    @keyframes spark {
      0%{transform:scale(0);opacity:0}
      50%{transform:scale(1.8);opacity:1;box-shadow:0 0 12px currentColor}
      100%{transform:scale(1);opacity:.5}
    }

    /* form section */
    #form-section { display:block; }
    #form-section.hidden { display:none; }

    @media(max-width:500px){
      .modal-inner{padding:26px 20px 28px}
      .apply-btn{padding:18px 32px}
      .main-title{font-size:18px;letter-spacing:3px}
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<main class="site-wrap">

  <!-- Logo -->
  <div class="logo-ring">
    <div class="logo-inner">
      <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="aura" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00ddff" stop-opacity=".55"/>
            <stop offset="100%" stop-color="#7b2fff" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="face" cx="45%" cy="40%" r="55%">
            <stop offset="0%" stop-color="#1a3a6e"/>
            <stop offset="100%" stop-color="#050d22"/>
          </radialGradient>
          <filter id="gf"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <circle cx="50" cy="50" r="48" fill="url(#aura)" opacity=".5"/>
        <g filter="url(#gf)" fill="#00ddff" opacity=".9">
          <polygon points="50,2 46,22 54,22"/>
          <polygon points="34,6 35,26 42,20"/>
          <polygon points="20,15 27,32 35,22"/>
          <polygon points="66,6 65,26 58,20"/>
          <polygon points="80,15 73,32 65,22"/>
          <polygon points="14,30 24,42 28,30"/>
          <polygon points="86,30 76,42 72,30"/>
        </g>
        <ellipse cx="50" cy="58" rx="26" ry="30" fill="url(#face)"/>
        <ellipse cx="40" cy="52" rx="5" ry="3.5" fill="#00ddff" opacity=".9" filter="url(#gf)"/>
        <ellipse cx="60" cy="52" rx="5" ry="3.5" fill="#00ddff" opacity=".9" filter="url(#gf)"/>
        <ellipse cx="40" cy="52" rx="2.5" ry="2" fill="#fff"/>
        <ellipse cx="60" cy="52" rx="2.5" ry="2" fill="#fff"/>
        <ellipse cx="40" cy="52" rx="1" ry="1.8" fill="#001830"/>
        <ellipse cx="60" cy="52" rx="1" ry="1.8" fill="#001830"/>
        <line x1="30" y1="57" x2="37" y2="54" stroke="#00ddff" stroke-width="1.2" opacity=".6"/>
        <line x1="70" y1="57" x2="63" y2="54" stroke="#00ddff" stroke-width="1.2" opacity=".6"/>
        <circle cx="50" cy="44" r="3" stroke="#7b2fff" stroke-width="1.5" fill="none" filter="url(#gf)"/>
        <circle cx="44" cy="44" r="3" stroke="#7b2fff" stroke-width="1.5" fill="none" filter="url(#gf)"/>
        <circle cx="56" cy="44" r="3" stroke="#7b2fff" stroke-width="1.5" fill="none" filter="url(#gf)"/>
        <path d="M30 78 Q50 88 70 78" stroke="#00ddff" stroke-width="1.5" fill="none" opacity=".6"/>
      </svg>
    </div>
  </div>

  <h1 class="main-title">OCEANUS CHAIN</h1>
  <p class="subtitle">AI × BLOCKCHAIN | NEXT GENERATION</p>

  <div class="soon-badge">
    <span class="soon-text">SOON</span>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <button class="apply-btn" id="applyBtn">⬡ APPLY NOW ⬡</button>

</main>

<!-- ═══════════ MODAL ═══════════ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-bar"></div>
    <button class="modal-close" id="closeBtn">✕</button>
    <div class="modal-inner">

      <div id="form-section">
        <div class="modal-heading">APPLY WHITELIST</div>

        <!-- Row 1: Follow -->
        <div class="task-row" id="row-follow">
          <span class="task-label">FOLLOW OCEANUS</span>
          <button class="task-btn x-btn" id="followBtn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Follow
          </button>
        </div>

        <!-- Row 2: Retweet -->
        <div class="task-row" id="row-rt">
          <span class="task-label">RETWEET PINNED POST</span>
          <button class="task-btn x-btn" id="rtBtn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            RT Link
          </button>
        </div>

        <!-- Row 3: Username input -->
        <div class="username-row">
          <div class="username-row-label">X USERNAME</div>
          <input
            type="text"
            class="username-input"
            id="usernameInput"
            placeholder="@username"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <button class="submit-btn" id="submitBtn">SUBMIT →</button>
      </div>

      <!-- Success -->
      <div class="success" id="successScreen">
        <span class="success-icon">✦</span>
        <div class="success-sparks">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="success-title">REGISTERED!</div>
        <div class="success-msg">
          YOU'RE ON THE LIST.<br/>
          WE'LL HIT YOUR DM SOON.
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // ── Canvas particles ───────────────────────────────────
  const cv = document.getElementById('bg-canvas');
  const cx = cv.getContext('2d');
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  resize(); addEventListener('resize', resize);

  const pts = Array.from({length:100}, () => ({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    sz: Math.random()*2+.4,
    vx: (Math.random()-.5)*.35,
    vy: -(Math.random()*.5+.15),
    o: Math.random()*.6+.1,
    p: Math.random()*Math.PI*2,
    col: Math.random()>.6?'#00ddff':'#7b2fff'
  }));

  const wlines = Array.from({length:10}, () => ({
    y: Math.random()*innerHeight,
    x: -200,
    spd: Math.random()*1.2+.4,
    w: Math.random()*180+80,
    o: Math.random()*.12+.02,
    col: Math.random()>.5?'#00ddff':'#7b2fff'
  }));

  function frame(){
    const bg = cx.createRadialGradient(cv.width*.5,cv.height*.4,0,cv.width*.5,cv.height*.5,cv.width*.8);
    bg.addColorStop(0,'#030d2b'); bg.addColorStop(.5,'#010818'); bg.addColorStop(1,'#000408');
    cx.fillStyle=bg; cx.fillRect(0,0,cv.width,cv.height);

    wlines.forEach(l=>{
      l.x+=l.spd;
      if(l.x>cv.width+200){ l.x=-200; l.y=Math.random()*cv.height; }
      cx.save(); cx.globalAlpha=l.o;
      const g=cx.createLinearGradient(l.x-l.w/2,0,l.x+l.w/2,0);
      g.addColorStop(0,'transparent'); g.addColorStop(.5,l.col); g.addColorStop(1,'transparent');
      cx.strokeStyle=g; cx.lineWidth=1;
      cx.beginPath(); cx.moveTo(l.x-l.w/2,l.y); cx.lineTo(l.x+l.w/2,l.y); cx.stroke();
      cx.restore();
    });

    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.p+=.04;
      p.o=.2+Math.sin(p.p)*.3;
      if(p.y<-10){ p.y=cv.height+10; p.x=Math.random()*cv.width; }
      const rg=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz*4);
      rg.addColorStop(0,p.col); rg.addColorStop(1,'transparent');
      cx.save(); cx.globalAlpha=p.o;
      cx.fillStyle=rg; cx.beginPath(); cx.arc(p.x,p.y,p.sz*4,0,Math.PI*2); cx.fill();
      cx.restore();
    });
    requestAnimationFrame(frame);
  }
  frame();

  // ── Modal logic ────────────────────────────────────────
  const overlay   = document.getElementById('overlay');
  const applyBtn  = document.getElementById('applyBtn');
  const closeBtn  = document.getElementById('closeBtn');
  const followBtn = document.getElementById('followBtn');
  const rtBtn     = document.getElementById('rtBtn');
  const submitBtn = document.getElementById('submitBtn');
  const input     = document.getElementById('usernameInput');
  const formSec   = document.getElementById('form-section');
  const successSc = document.getElementById('successScreen');
  const rowFollow = document.getElementById('row-follow');
  const rowRt     = document.getElementById('row-rt');

  applyBtn.addEventListener('click', () => overlay.classList.add('open'));

  function close(){
    overlay.classList.remove('open');
    setTimeout(reset, 300);
  }
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', e => { if(e.target===overlay) close(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape') close(); });

  function reset(){
    formSec.classList.remove('hidden');
    successSc.classList.remove('show');
    followBtn.textContent='Follow'; followBtn.classList.remove('checked');
    rtBtn.textContent='RT Link'; rtBtn.classList.remove('checked');
    rowFollow.classList.remove('done'); rowRt.classList.remove('done');
    // restore icons
    followBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>Follow`;
    rtBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>RT Link`;
    input.value='';
    input.style.borderBottomColor='';
  }

  followBtn.addEventListener('click', () => {
    window.open('https://x.com/OceanusChain','_blank');
    setTimeout(() => {
      followBtn.innerHTML = '✓ Done';
      followBtn.classList.add('checked');
      rowFollow.classList.add('done');
    }, 600);
  });

  rtBtn.addEventListener('click', () => {
    window.open('https://x.com/OceanusChain','_blank');
    setTimeout(() => {
      rtBtn.innerHTML = '✓ Done';
      rtBtn.classList.add('checked');
      rowRt.classList.add('done');
    }, 600);
  });

  submitBtn.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if(e.key==='Enter') submit(); });

  function submit(){
    const val = input.value.trim();
    if(!val){
      input.style.borderBottomColor='#ff3060';
      input.placeholder='Enter your username!';
      setTimeout(() => {
        input.style.borderBottomColor='';
        input.placeholder='@username';
      }, 2000);
      return;
    }
    formSec.classList.add('hidden');
    successSc.classList.add('show');
  }
</script>
</body>
</html>
