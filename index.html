<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oceanus Chain | Early Access</title>
    <style>
        :root {
            --bg-color: #020813;
            --neon-blue: #00f3ff;
            --neon-purple: #9d00ff;
            --text-color: #e2f1ff;
            --glass-bg: rgba(2, 15, 36, 0.7);
            --glass-border: rgba(0, 243, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* خلفية حركة أمواج السيبرانية */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 20% 30%, rgba(157, 0, 255, 0.05) 0%, transparent 40%);
            animation: oceanMove 20s infinite linear;
            z-index: 1;
        }

        @keyframes oceanMove {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 550px;
            padding: 40px 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 243, 255, 0.1),
                        inset 0 1px 2px rgba(255, 255, 255, 0.1);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 30%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #8fa7be;
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* العداد التنازلي */
        .countdown-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
            gap: 10px;
        }

        .countdown-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 5px;
            border-radius: 12px;
            border: 1px solid rgba(0, 243, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .countdown-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
        }

        .countdown-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .countdown-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #66829a;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* الفورم المربوط بـ Formspree */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            position: relative;
        }

        input[type="email"] {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 243, 255, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 243, 255, 0.5);
            filter: brightness(1.1);
        }

        button[type="submit"]:active {
            transform: translateY(1px);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #536f85;
        }

        /* ستايل متناسق مع شاشات الهاتف الصغيرة */
        @media (max-width: 400px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.8rem; }
            .countdown-value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <!-- أيقونة المحيط السيبراني الموجية -->
            <div class="logo-icon">🌊</div>
        </div>
        
        <h1>OCEANUS CHAIN</h1>
        <p class="subtitle">The Next Generation Decentralized Secure Ecosystem. Join the waitlist for exclusive early access and features.</p>

        <!-- العداد التنازلي: مبرمج لـ 30 يوم تلقائياً من الآن -->
        <div class="countdown-container">
            <div class="countdown-box">
                <div class="countdown-value" id="days">00</div>
                <div class="countdown-label">Days</div>
            </div>
            <div class="countdown-box">
                <div class="countdown-value" id="hours">00</div>
                <div class="countdown-label">Hours</div>
            </div>
            <div class="countdown-box">
                <div class="countdown-value" id="minutes">00</div>
                <div class="countdown-label">Min</div>
            </div>
            <div class="countdown-box">
                <div class="countdown-value" id="seconds">00</div>
                <div class="countdown-label">Sec</div>
            </div>
        </div>

        <!-- الفورم المربوط بحسابك مباشرة -->
        <form action="https://formspree.io/f/xzdwnpva" method="POST">
            <div class="input-group">
                <input type="email" name="email" placeholder="Enter your secure email address" required>
            </div>
            <button type="submit">Join Secure Waitlist</button>
        </form>

        <p class="footer-text">© 2026 Oceanus Labs. All secure connections encrypted.</p>
    </div>

    <script>
        // برمجة المؤقت التنازلي (حطيتولك هنا ينتهي بعد 30 يوم من اليوم تلقائياً)
        // تقدر تبدل هاد التاريخ لأي يوم حابو يخلص فيه الـ Countdown سوا سوا
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 30); 

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                document.querySelector('.countdown-container').innerHTML = "<div style='color: #00f3ff; font-weight: bold; width:100%;'>WE ARE LIVE!</div>";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days < 10 ? '0' + days : days;
            document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
            document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
