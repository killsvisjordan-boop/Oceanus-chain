/* ══ ROOT ══ */
:root{
  --blue:#00B8FF;--ocean:#009DFF;--glow:#33CCFF;
  --navy:#07111F;--dark:#050D1A;--black:#000;--white:#fff;
  --glass:rgba(0,184,255,.07);--gb:rgba(0,184,255,.18);--success:#00FF88;
  --tb-h:30px;--bar-h:46px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Rajdhani',sans-serif;background:#000;color:#fff;overflow:hidden;cursor:none;height:100vh;width:100vw;user-select:none;}
@media(max-width:768px){body{overflow-y:auto;overflow-x:hidden;}}

/* ══ CURSOR ══ */
#cursor{width:10px;height:10px;background:var(--blue);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .25s,height .25s;box-shadow:0 0 10px var(--blue),0 0 24px var(--blue);}
#cursor-ring{width:30px;height:30px;border:1px solid rgba(0,184,255,.38);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .3s,height .3s;}
.cursor-ripple{position:fixed;pointer-events:none;z-index:99997;border-radius:50%;border:1px solid rgba(0,184,255,.5);animation:rippleOut .6s ease forwards;top:0;left:0;}
@keyframes rippleOut{from{width:0;height:0;opacity:.8;transform:translate(-50%,-50%) scale(0);}to{width:56px;height:56px;opacity:0;transform:translate(-50%,-50%) scale(1);}}
@media(hover:none){#cursor,#cursor-ring{display:none;}body{cursor:auto;}}

/* ══ CANVAS ══ */
#ocean-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ══ LOADING / OS BOOT ══ */
#screen-loading{position:fixed;inset:0;z-index:500;background:radial-gradient(ellipse at center,#020c1e 0%,#000 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .8s ease;}
#screen-loading.fade{opacity:0;pointer-events:none;}
.ld-logo{width:90px;height:90px;animation:logoPulse 2s ease-in-out infinite;filter:drop-shadow(0 0 18px var(--blue));}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 18px var(--blue));}50%{filter:drop-shadow(0 0 40px var(--glow)) drop-shadow(0 0 64px var(--ocean));}}
.ld-os-brand{text-align:center;margin-top:2px;}
.ld-os-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:8px;color:#fff;text-shadow:0 0 20px var(--blue);line-height:1.2;}
.ld-os-ver{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-top:4px;}
.ld-eth{display:flex;align-items:center;gap:7px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(100,160,255,.5);margin-top:2px;}
.ld-text{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:var(--blue);text-shadow:0 0 14px var(--blue);min-height:16px;text-align:center;padding:0 24px;}
.ld-bar-wrap{width:260px;max-width:80vw;height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.ld-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--ocean),var(--glow));border-radius:3px;transition:width .35s ease;position:relative;}
.ld-bar::after{content:'';position:absolute;right:0;top:-4px;width:4px;height:11px;background:var(--glow);border-radius:2px;box-shadow:0 0 10px var(--glow);}
.ld-pct{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.28);letter-spacing:2px;}

/* ══ GATE / OS LOGIN ══ */
#screen-gate{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .6s ease;}
#screen-gate.show{opacity:1;pointer-events:all;}
#screen-gate.hide{opacity:0;pointer-events:none;}
