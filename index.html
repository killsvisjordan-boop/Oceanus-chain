<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceanus Chain — $OCS | Oceanus OS v2035</title>
<meta name="description" content="Oceanus Chain — Join the next-generation Web3 ecosystem. Secure your pioneer spot before the tide reaches the world.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

/* ══ ROOT ══ */
:root{
  --blue:#00B8FF;--ocean:#009DFF;--glow:#33CCFF;
  --navy:#07111F;--dark:#050D1A;--black:#000;--white:#fff;
  --glass:rgba(0,184,255,.07);--gb:rgba(0,184,255,.18);--success:#00FF88;
  --tb-h:30px;--bar-h:46px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Rajdhani',sans-serif;background:#000;color:#fff;overflow:hidden;cursor:none;height:100vh;width:100vw;user-select:none;}
@media(max-width:768px){
  body{overflow-y:auto;overflow-x:hidden;height:auto;min-height:100vh;}
  .os-win,.modal,.nft-modal,#start-menu{backdrop-filter:none!important;-webkit-backdrop-filter:none!important;}
}

/* ══ CURSOR ══ */
#cursor{width:10px;height:10px;background:var(--blue);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .25s,height .25s;box-shadow:0 0 10px var(--blue),0 0 24px var(--blue);}
#cursor-ring{width:30px;height:30px;border:1px solid rgba(0,184,255,.38);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width .3s,height .3s;}
.cursor-ripple{position:fixed;pointer-events:none;z-index:99997;border-radius:50%;border:1px solid rgba(0,184,255,.5);animation:rippleOut .6s ease forwards;top:0;left:0;}
@keyframes rippleOut{from{width:0;height:0;opacity:.8;transform:translate(-50%,-50%) scale(0);}to{width:56px;height:56px;opacity:0;transform:translate(-50%,-50%) scale(1);}}
@media(hover:none){#cursor,#cursor-ring{display:none;}body{cursor:auto;}}

/* ══ CANVAS ══ */
#ocean-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ══ LOADING / OS BOOT ══ */
#screen-loading{position:fixed;inset:0;z-index:500;background:radial-gradient(ellipse at center,#020c1e 0%,#000 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .5s ease;}
#screen-loading.fade{opacity:0;pointer-events:none;}
.ld-logo{width:90px;height:90px;filter:drop-shadow(0 0 18px var(--blue));}
@media(min-width:769px){.ld-logo{animation:logoPulse 2s ease-in-out infinite;}}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 18px var(--blue));}50%{filter:drop-shadow(0 0 40px var(--glow)) drop-shadow(0 0 64px var(--ocean));}}
.ld-os-brand{text-align:center;margin-top:2px;}
.ld-os-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:8px;color:#fff;text-shadow:0 0 20px var(--blue);line-height:1.2;}
.ld-os-ver{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-top:4px;}
.ld-eth{display:flex;align-items:center;gap:7px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(100,160,255,.5);margin-top:2px;}
.ld-text{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:var(--blue);min-height:16px;text-align:center;padding:0 24px;}
.ld-bar-wrap{width:260px;max-width:80vw;height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.ld-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--ocean),var(--glow));border-radius:3px;transition:width .3s linear;position:relative;}
.ld-bar::after{content:'';position:absolute;right:0;top:-4px;width:4px;height:11px;background:var(--glow);border-radius:2px;}
.ld-pct{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.28);letter-spacing:2px;}

/* ══ GATE / OS LOGIN ══ */
#screen-gate{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .6s ease;touch-action:auto;}
#screen-gate.show{opacity:1;pointer-events:all;}
#screen-gate.hide{opacity:0;pointer-events:none;}
.gate-win{background:rgba(4,11,24,.97);border:1px solid rgba(0,184,255,.28);border-radius:8px 8px 4px 4px;width:420px;max-width:92vw;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.9),0 0 40px rgba(0,184,255,.08),inset 0 1px 0 rgba(255,255,255,.05);animation:winOpen .45s cubic-bezier(.22,.61,.36,1);}
@keyframes winOpen{from{opacity:0;transform:scale(.93) translateY(14px);}to{opacity:1;transform:scale(1) translateY(0);}}
.gate-tb{display:flex;align-items:center;gap:8px;padding:0 8px 0 12px;height:var(--tb-h);background:linear-gradient(180deg,#1e5aa8 0%,#103578 50%,#0a2868 100%);border-bottom:1px solid rgba(0,184,255,.22);user-select:none;position:relative;}
.gate-tb::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);}
.gate-tb-icon{font-size:13px;}
.gate-tb-label{flex:1;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:#fff;text-shadow:0 0 8px rgba(0,184,255,.4);}
.gate-tb-btns{display:flex;gap:3px;}
.gtbtn{width:17px;height:17px;border-radius:3px;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:900;line-height:1;transition:filter .15s;}
.gtbtn:hover{filter:brightness(1.3);}
.gtbtn-min{background:linear-gradient(180deg,#3a88e0,#1e60b0);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.2);}
.gtbtn-cls{background:linear-gradient(180deg,#e84848,#be2020);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.2);}
.gate-body{padding:30px 32px 28px;text-align:center;}
.gate-lock{font-size:50px;filter:drop-shadow(0 0 22px var(--blue));animation:lockFloat 3s ease-in-out infinite;display:block;margin-bottom:16px;}
@keyframes lockFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.gate-title{font-family:'Orbitron',monospace;font-size:clamp(16px,5vw,22px);letter-spacing:6px;font-weight:900;background:linear-gradient(135deg,#fff 40%,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
.gate-sub{font-size:13px;color:rgba(255,255,255,.42);max-width:320px;margin:0 auto 22px;line-height:1.75;}
.btn-gate{padding:11px 38px;background:linear-gradient(180deg,#2a8de8 0%,#1a62b0 45%,#144ea0 100%);border:1px solid rgba(0,184,255,.4);color:#fff;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;cursor:pointer;transition:all .3s;border-radius:3px;box-shadow:0 4px 18px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.16);}
.btn-gate:hover{background:linear-gradient(180deg,#3a9ef8,#2a72c0,#1a5ea8);box-shadow:0 0 24px rgba(0,184,255,.38),0 4px 18px rgba(0,0,0,.45);}
.gate-eth{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.18);margin-top:18px;}

/* ══ REST OF YOUR CYBERPUNK STYLES (Kept exactly identical) ══ */
#site{position:fixed;inset:0;z-index:10;opacity:0;pointer-events:none;transition:opacity 1s ease;}
#site.visible{opacity:1;pointer-events:all;}
#desktop{position:absolute;inset:0;bottom:var(--bar-h);overflow:hidden;}
.dsk-icons{position:absolute;top:18px;left:14px;display:flex;flex-direction:column;gap:4px;z-index:5;}
.d-ico{display:flex;flex-direction:column;align-items:center;gap:5px;width:72px;padding:8px 4px 6px;border-radius:4px;cursor:pointer;transition:background .15s;user-select:none;}
.d-ico:hover{background:rgba(0,184,255,.16);backdrop-filter:blur(10px);}
.d-ico-lbl{font-size:10px;color:#fff;text-align:center;}
.os-win{position:absolute;display:flex;flex-direction:column;background:rgba(4,11,24,.93);border-radius:8px;border:1px solid rgba(0,184,255,.2);z-index:50;}
.win-tb{display:flex;align-items:center;height:var(--tb-h);background:linear-gradient(180deg,#1e5aa8,#0a2868);color:#fff;}
.win-body{flex:1;overflow-y:auto;padding:22px;}
#taskbar{position:fixed;bottom:0;left:0;right:0;height:var(--bar-h);background:rgba(6,16,38,.97);display:flex;align-items:center;z-index:200;}
#start-btn{padding:4px 14px;background:linear-gradient(180deg,#2a8de8,#144ea0);color:#fff;cursor:pointer;}
</style>
</head>
<body>

<div id="screen-loading">
  <div class="ld-logo">🌐</div>
  <div class="ld-os-brand">
    <div class="ld-os-title">OCEANUS OS</div>
    <div class="ld-os-ver">v2035.ALPHA</div>
  </div>
  <div class="ld-bar-wrap"><div class="ld-bar" id="loading-bar"></div></div>
  <div class="ld-pct" id="loading-pct">0%</div>
  <div class="ld-text" id="loading-txt">INITIALIZING QUANTUM LAYER...</div>
</div>

<div id="screen-gate">
  <div class="gate-win">
    <div class="gate-tb"><div class="gate-tb-label">SYSTEM LOCK</div></div>
    <div class="gate-body">
      <span class="gate-lock">🔒</span>
      <h1 class="gate-title">OCEANUS CHAIN</h1>
      <p class="gate-sub">Enter the next-generation Web3 operating system ecosystem.</p>
      <button class="btn-gate" onclick="unlockSystem()">BOOT SYSTEM</button>
    </div>
  </div>
</div>

<div id="site">
  <div id="desktop">
    <div class="dsk-icons">
      <div class="d-ico" onclick="alert('Opening Ecosystem info...')">
        <span style="font-size:30px;">💎</span>
        <span class="d-ico-lbl">Ecosystem</span>
      </div>
    </div>
    
    <div class="os-win" style="top:50px;left:150px;width:400px;height:300px;">
      <div class="win-tb"><div style="padding-left:10px;">Welcome.exe</div></div>
      <div class="win-body">
        <h2>Oceanus Chain Active</h2>
        <p>Welcome to Oceanus OS v2035. System is operational.</p>
      </div>
    </div>
  </div>
  
  <div id="taskbar">
    <button id="start-btn">START</button>
  </div>
</div>

<script>
  // Simulated progress loader script
  let pct = 0;
  const bar = document.getElementById('loading-bar');
  const pctTxt = document.getElementById('loading-pct');
  const statusTxt = document.getElementById('loading-txt');
  
  const statusMsgs = [
    "CONNECTING TO OCEANUS NETWORK...",
    "SYNCHRONIZING BLOCKCHAIN LEDGER...",
    "ESTABLISHING ETHEREUM SECURE LINK...",
    "LOADING GRAPHICAL INTERFACE OS...",
    "SYSTEM READY."
  ];

  const interval = setInterval(() => {
    if (pct < 100) {
      pct += 2;
      bar.style.width = pct + '%';
      pctTxt.textContent = pct + '%';
      
      // Rotate status text based on percentage
      if(pct < 25) statusTxt.textContent = statusMsgs[0];
      else if(pct < 50) statusTxt.textContent = statusMsgs[1];
      else if(pct < 75) statusTxt.textContent = statusMsgs[2];
      else if(pct < 95) statusTxt.textContent = statusMsgs[3];
      else statusTxt.textContent = statusMsgs[4];
    } else {
      clearInterval(interval);
      hideLoaderAndShowGate();
    }
  }, 40);

  function hideLoaderAndShowGate() {
    const loader = document.getElementById('screen-loading');
    if (loader) {
      loader.classList.add('fade');
      setTimeout(() => {
        loader.style.display = 'none';
        document.getElementById('screen-gate').classList.add('show');
      }, 500);
    }
  }

  function unlockSystem() {
    document.getElementById('screen-gate').classList.remove('show');
    document.getElementById('screen-gate').classList.add('hide');
    document.getElementById('site').classList.add('visible');
  }

  // FORCE BYPASS SAFEGUARD: If fonts block window 'load' event, hide loader anyway after 3.5 seconds maximum!
  window.addEventListener('load', () => {
    // If progress bar finishes faster naturally
  });
  
  setTimeout(() => {
    if(pct < 100) {
      pct = 100;
      bar.style.width = '100%';
      pctTxt.textContent = '100%';
      statusTxt.textContent = "SYSTEM READY.";
      clearInterval(interval);
      hideLoaderAndShowGate();
    }
  }, 3500);
</script>
</body>
</html>
